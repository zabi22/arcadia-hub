{% extends "base.html" %}

{% block title %}{{ game.name }} - Arcadia Hub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h3 class="text-white mb-2">{{ game.icon }} {{ game.name }}</h3>
                <p class="text-white-50">Find all matching pairs!</p>
            </div>
            
            <!-- Stats -->
            <div class="row mb-3">
                <div class="col-6 text-center">
                    <div class="card bg-dark">
                        <div class="card-body py-2">
                            <h6 class="text-info">Moves: <span id="moves">0</span></h6>
                        </div>
                    </div>
                </div>
                <div class="col-6 text-center">
                    <div class="card bg-dark">
                        <div class="card-body py-2">
                            <h6 class="text-warning">Time: <span id="timer">0</span>s</h6>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Game Board -->
            <div class="row g-2 mb-3" id="gameBoard">
                <!-- Cards will be generated by JavaScript -->
            </div>
            
            <!-- Controls -->
            <div class="text-center">
                <button id="restartBtn" class="btn btn-accent">
                    <i class="bi bi-arrow-clockwise"></i> New Game
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.memory-card {
    aspect-ratio: 1;
    perspective: 1000px;
    cursor: pointer;
}

.memory-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.memory-card.flipped .memory-card-inner {
    transform: rotateY(180deg);
}

.memory-card-front,
.memory-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
}

.memory-card-front {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.memory-card-back {
    background: rgba(22, 33, 62, 0.9);
    border: 2px solid #2d3561;
    transform: rotateY(180deg);
}

.memory-card.matched .memory-card-back {
    background: rgba(0, 255, 136, 0.3);
    border-color: #00ff88;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
const emojis = ['🎮', '🎮', '🐍', '🐍', '🏆', '🏆', '💰', '💰', '🎯', '🎯', '⭐', '⭐', '🚀', '🚀', '🔥', '🔥'];
let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let moves = 0;
let startTime;
let timerInterval;
let gameStarted = false;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function createBoard() {
    const board = document.getElementById('gameBoard');
    board.innerHTML = '';
    shuffledEmojis = shuffle([...emojis]);
    
    shuffledEmojis.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'memory-card';
        card.dataset.index = index;
        card.dataset.emoji = emoji;
        
        card.innerHTML = `
            <div class="memory-card-inner">
                <div class="memory-card-front">?</div>
                <div class="memory-card-back">${emoji}</div>
            </div>
        `;
        
        card.addEventListener('click', flipCard);
        board.appendChild(card);
    });
}

function flipCard() {
    if (!gameStarted) {
        startTimer();
        gameStarted = true;
    }
    
    if (flippedCards.length === 2 || this.classList.contains('flipped') || this.classList.contains('matched')) {
        return;
    }
    
    this.classList.add('flipped');
    flippedCards.push(this);
    
    if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        checkMatch();
    }
}

function checkMatch() {
    const [card1, card2] = flippedCards;
    const match = card1.dataset.emoji === card2.dataset.emoji;
    
    if (match) {
        card1.classList.add('matched');
        card2.classList.add('matched');
        matchedPairs++;
        flippedCards = [];
        
        if (matchedPairs === emojis.length / 2) {
            endGame();
        }
    } else {
        setTimeout(() => {
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
            flippedCards = [];
        }, 1000);
    }
}

function startTimer() {
    startTime = Date.now();
    timerInterval = setInterval(() => {
        const seconds = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer').textContent = seconds;
    }, 1000);
}

function endGame() {
    clearInterval(timerInterval);
    const time = Math.floor((Date.now() - startTime) / 1000);
    const score = Math.max(100 - (moves * 2) - time, 10);
    
    setTimeout(() => {
        alert(`🎉 You won!\nMoves: ${moves}\nTime: ${time}s\nScore: ${score}`);
        saveScore(score);
    }, 500);
}

function saveScore(score) {
    fetch('/api/score', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            game_key: '{{ game.game_key }}',
            score: score,
            play_time: Math.floor((Date.now() - startTime) / 1000)
        })
    });
}

function restartGame() {
    clearInterval(timerInterval);
    matchedPairs = 0;
    moves = 0;
    flippedCards = [];
    gameStarted = false;
    document.getElementById('moves').textContent = '0';
    document.getElementById('timer').textContent = '0';
    createBoard();
}

document.getElementById('restartBtn').addEventListener('click', restartGame);
createBoard();
</script>
{% endblock %}
