{% extends "base.html" %}

{% block title %}Register - Arcadia Hub{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-controller" style="font-size: 3rem; color: var(--accent-color);"></i>
                <h2 class="mt-3 text-white">Join Arcadia Hub</h2>
                <p class="text-white-50">Create your account and start playing!</p>
            </div>
            
            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label for="username" class="form-label text-white">Username</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" 
                           id="username" name="username" required minlength="3" maxlength="20">
                    <small class="text-white-50">Letters, numbers, and underscores only</small>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label text-white">Email</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" 
                           id="email" name="email" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label text-white">Password</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" 
                           id="password" name="password" required minlength="8">
                    <small class="text-white-50">Must include uppercase, lowercase, and number</small>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-2">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-white-50 mb-0">Already have an account?</p>
                <a href="{{ url_for('login') }}" class="text-white fw-bold">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
