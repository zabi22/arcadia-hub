{% extends "base.html" %}

{% block title %}Games - Arcadia Hub{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h2 class="text-white mb-3"><i class="bi bi-joystick"></i> All Games</h2>
    </div>
</div>

<div class="row g-4">
    {% for game in games %}
    <div class="col-md-4 col-sm-6">
        <a href="{{ url_for('main.play_game', game_key=game.game_key) }}" 
           class="text-decoration-none">
            <div class="card game-card h-100 p-4 text-center">
                <div style="font-size: 4rem;" class="mb-3">{{ game.icon }}</div>
                <h5 class="text-white mb-2">{{ game.name }}</h5>
                <p class="text-white-50 mb-2">{{ game.difficulty }}</p>
                <div class="mt-3">
                    <span class="badge bg-secondary">{{ game.play_count }} plays</span>
                </div>
            </div>
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
