{% extends "base.html" %}

{% block title %}Chat - Arcadia Hub{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h2 class="text-white mb-3">
            <i class="bi bi-chat-dots"></i> Global Chat
        </h2>
        <p class="text-white-50">Connect with other gamers in real-time!</p>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card p-0" style="height: 70vh;">
            <!-- Chat Header -->
            <div class="card-header bg-dark border-secondary p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="text-white mb-0">
                            <i class="bi bi-globe"></i> Global Chat Room
                        </h5>
                        <small class="text-white-50" id="online-count">Loading...</small>
                    </div>
                    <div>
                        <span class="badge bg-success" id="connection-status">Connecting...</span>
                    </div>
                </div>
            </div>
            
            <!-- Chat Messages -->
            <div class="card-body bg-dark overflow-auto" id="chat-messages" style="height: calc(70vh - 140px);">
                <div class="text-center text-white-50 mt-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Connecting to chat...</p>
                </div>
            </div>
            
            <!-- Typing Indicator -->
            <div class="px-3 py-1 bg-dark border-top border-secondary" id="typing-indicator" style="display: none;">
                <small class="text-white-50"><span id="typing-user"></span> is typing...</small>
            </div>
            
            <!-- Chat Input -->
            <div class="card-footer bg-dark border-secondary p-3">
                <form id="chat-form" class="d-flex gap-2">
                    <input type="text" 
                           id="message-input" 
                           class="form-control bg-dark text-white border-secondary" 
                           placeholder="Type your message..." 
                           maxlength="500"
                           autocomplete="off">
                    <button type="submit" class="btn btn-accent px-4">
                        <i class="bi bi-send"></i> Send
                    </button>
                </form>
                <small class="text-white-50 mt-1 d-block">Press Enter to send • Max 500 characters</small>
            </div>
        </div>
    </div>
</div>

<!-- Include Socket.IO -->
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
$(document).ready(function() {
    // Connect to Socket.IO (WebSocket only for better performance)
    const socket = io({
        transports: ['websocket'],
        upgrade: false,
        timeout: 5000,
        forceNew: true
    });
    
    let typingTimeout;
    let onlineUsers = new Set();
    
    // Connection established
    socket.on('connect', function() {
        $('#connection-status').text('Connected').removeClass('bg-warning bg-danger').addClass('bg-success');
        $('#online-count').text('Connected');
        console.log('Connected to chat server');
        
        // Join global chat
        socket.emit('join_global_chat');
        
        // Load recent messages asynchronously
        setTimeout(loadMessages, 100); // Small delay to let connection stabilize
    });
    
    // Connection error
    socket.on('connect_error', function(error) {
        $('#connection-status').text('Connection Error').removeClass('bg-success bg-warning').addClass('bg-danger');
        console.error('Connection error:', error);
    });
    
    // Disconnect
    socket.on('disconnect', function() {
        $('#connection-status').text('Disconnected').removeClass('bg-success bg-warning').addClass('bg-danger');
    });
    
    // New message
    socket.on('new_message', function(data) {
        appendMessage(data);
        scrollToBottom();
    });
    
    // System message
    socket.on('system_message', function(data) {
        appendSystemMessage(data.content);
        scrollToBottom();
    });
    
    // User status update
    socket.on('user_status', function(data) {
        if (data.status === 'online') {
            onlineUsers.add(data.user_id);
        } else {
            onlineUsers.delete(data.user_id);
        }
        updateOnlineCount();
    });
    
    // Error
    socket.on('error', function(data) {
        showAlert(data.message, 'danger');
    });
    
    // User typing
    let typingUsers = {};
    socket.on('user_typing', function(data) {
        if (data.user_id !== {{ session.get('user_id', 0) }}) {
            typingUsers[data.user_id] = data.username;
            updateTypingIndicator();
        }
    });
    
    socket.on('user_stopped_typing', function(data) {
        delete typingUsers[data.user_id];
        updateTypingIndicator();
    });
    
    // Send message (show immediately for better UX)
    $('#chat-form').on('submit', function(e) {
        e.preventDefault();
        
        const message = $('#message-input').val().trim();
        if (!message) return;
        
        // Show message immediately (optimistic update)
        const currentUserId = {{ session.get('user_id', 0) }};
        const now = new Date();
        appendMessage({
            sender_id: currentUserId,
            username: 'You',
            content: message,
            timestamp: now.toISOString()
        }, true);
        scrollToBottom();
        
        // Send to server
        socket.emit('send_message', { content: message });
        $('#message-input').val('');
        socket.emit('stop_typing');
    });
    
    // Typing indicator (throttled to reduce traffic)
    let lastTypingEmit = 0;
    $('#message-input').on('input', function() {
        const now = Date.now();
        // Only emit typing event every 2 seconds max
        if (now - lastTypingEmit > 2000) {
            socket.emit('typing');
            lastTypingEmit = now;
        }
        
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(function() {
            socket.emit('stop_typing');
        }, 1000);
    });
    
    // Load messages from API (with timeout for better performance)
    function loadMessages() {
        // Show loading state
        if ($('#chat-messages .text-center').length > 0) {
            $('#chat-messages .text-center p').text('Loading recent messages...');
        }
        
        $.ajax({
            url: '/api/chat/messages',
            method: 'GET',
            timeout: 3000,  // 3 second timeout
            cache: false,
            success: function(data) {
                $('#chat-messages').empty();
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(function(msg) {
                        appendMessage(msg, false);
                    });
                    scrollToBottom();
                } else {
                    $('#chat-messages').html('<div class="text-center text-white-50 mt-5"><i class="bi bi-chat" style="font-size: 3rem;"></i><p class="mt-3">No messages yet. Start the conversation!</p></div>');
                }
            },
            error: function(xhr, status, error) {
                console.error('Failed to load messages:', status, error);
                // Don't show error - just show empty state
                $('#chat-messages').empty();
                $('#chat-messages').html('<div class="text-center text-white-50 mt-5"><i class="bi bi-chat" style="font-size: 3rem;"></i><p class="mt-3">Start the conversation!</p><small class="text-white-50">Messages will appear here</small></div>');
            }
        });
    }
    
    // Append message to chat
    function appendMessage(data, animate = true) {
        const currentUserId = {{ session.get('user_id', 0) }};
        const isOwnMessage = data.sender_id === currentUserId;
        
        const messageHtml = `
            <div class="message-item mb-3 ${animate ? 'fade-in' : ''}" style="animation: slideIn 0.3s ease-out;">
                <div class="d-flex ${isOwnMessage ? 'justify-content-end' : 'justify-content-start'}">
                    <div class="message-bubble ${isOwnMessage ? 'own-message' : 'other-message'}" style="max-width: 70%;">
                        <div class="d-flex justify-content-between align-items-start mb-1">
                            <strong class="${isOwnMessage ? 'text-info' : 'text-warning'}">${data.username}</strong>
                            <small class="text-white-50 ms-2">${formatTime(data.timestamp)}</small>
                        </div>
                        <div class="text-white">${escapeHtml(data.content)}</div>
                    </div>
                </div>
            </div>
        `;
        
        $('#chat-messages').append(messageHtml);
    }
    
    // Append system message
    function appendSystemMessage(content) {
        const html = `
            <div class="text-center my-3">
                <span class="badge bg-secondary">${escapeHtml(content)}</span>
            </div>
        `;
        $('#chat-messages').append(html);
    }
    
    // Scroll to bottom
    function scrollToBottom() {
        const chatMessages = document.getElementById('chat-messages');
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    
    // Update online count
    function updateOnlineCount() {
        const count = onlineUsers.size;
        $('#online-count').text(`${count} user${count !== 1 ? 's' : ''} online`);
    }
    
    // Update typing indicator
    function updateTypingIndicator() {
        const users = Object.values(typingUsers);
        if (users.length > 0) {
            const text = users.length > 3 ? 'Several people' : users.join(', ');
            $('#typing-user').text(text);
            $('#typing-indicator').slideDown();
        } else {
            $('#typing-indicator').slideUp();
        }
    }
    
    // Format time
    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    // Escape HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Show alert
    function showAlert(message, type) {
        const alertHtml = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        $('#chat-messages').append(alertHtml);
    }
    
    // Add CSS animations
    $('<style>')
        .text(`
            @keyframes slideIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .fade-in { animation: slideIn 0.3s ease-out; }
            .message-bubble {
                padding: 10px 15px;
                border-radius: 15px;
                background: rgba(255, 255, 255, 0.05);
            }
            .own-message {
                background: rgba(0, 212, 255, 0.15) !important;
                border: 1px solid rgba(0, 212, 255, 0.3);
            }
            .other-message {
                background: rgba(255, 107, 107, 0.15) !important;
                border: 1px solid rgba(255, 107, 107, 0.3);
            }
        `)
        .appendTo('head');
});
</script>
{% endblock %}
