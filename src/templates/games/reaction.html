{% extends "base.html" %}

{% block title %}{{ game.name }} - Arcadia Hub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4 text-center">
            <h3 class="text-white mb-2">{{ game.icon }} {{ game.name }}</h3>
            <p class="text-white-50 mb-4">Test your reaction speed!</p>
            
            <!-- Game Area -->
            <div id="gameArea" class="mb-4" style="height: 300px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.1s;"
                 onclick="handleClick()">
                <div>
                    <div id="instruction" style="font-size: 2rem; color: white; font-weight: bold;">
                        Click Start to Begin
                    </div>
                    <div id="result" class="mt-3" style="font-size: 1.5rem; color: #00ff88; display: none;"></div>
                </div>
            </div>
            
            <!-- Stats -->
            <div class="row mb-3">
                <div class="col-4">
                    <div class="card bg-dark">
                        <div class="card-body">
                            <h6 class="text-info">Best Time</h6>
                            <h4 id="bestTime" class="text-white">-</h4>
                        </div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="card bg-dark">
                        <div class="card-body">
                            <h6 class="text-warning">Last Time</h6>
                            <h4 id="lastTime" class="text-white">-</h4>
                        </div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="card bg-dark">
                        <div class="card-body">
                            <h6 class="text-success">Streak</h6>
                            <h4 id="streak" class="text-white">0🔥</h4>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="text-center">
                <button id="startBtn" class="btn btn-accent btn-lg">
                    <i class="bi bi-play-fill"></i> Start Test
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let waitingForStart = false;
let waitingForClick = false;
let startTime = 0;
let timeoutId = null;
let bestTime = localStorage.getItem('reactionBest') || null;
let streak = 0;
let maxStreak = 0;

if (bestTime) {
    document.getElementById('bestTime').textContent = bestTime + 'ms';
}

function handleClick() {
    if (waitingForStart) {
        clearTimeout(timeoutId);
        waitingForStart = false;
        streak = 0;
        document.getElementById('streak').textContent = streak + '🔥';
        document.getElementById('instruction').textContent = 'Too early! Click Start again';
        document.getElementById('gameArea').style.background = 'linear-gradient(135deg, #ff2a6d, #ff6b6b)';
        setTimeout(() => {
            document.getElementById('gameArea').style.background = '#0f0f1a';
        }, 500);
        return;
    }
    
    if (waitingForClick) {
        const reactionTime = Date.now() - startTime;
        waitingForClick = false;
        
        // Update streak
        if (reactionTime < 300) {
            streak++;
            if (streak > maxStreak) maxStreak = streak;
        } else {
            streak = 0;
        }
        document.getElementById('streak').textContent = streak + '🔥';
        
        const rating = getReactionRating(reactionTime);
        document.getElementById('gameArea').style.background = 'linear-gradient(135deg, #05ffa1, #00f3ff)';
        document.getElementById('instruction').innerHTML = `<span style="font-size: 3rem; font-weight: bold;">${reactionTime}ms</span>`;
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').textContent = rating;
        
        document.getElementById('lastTime').textContent = reactionTime + 'ms';
        
        if (!bestTime || reactionTime < parseInt(bestTime)) {
            bestTime = reactionTime;
            localStorage.setItem('reactionBest', bestTime);
            document.getElementById('bestTime').textContent = bestTime + 'ms';
        }
        
        saveScore(reactionTime, streak);
        
        setTimeout(() => {
            document.getElementById('gameArea').style.background = '#0f0f1a';
            document.getElementById('startBtn').disabled = false;
        }, 1500);
    }
}

function getReactionRating(time) {
    if (time < 150) return '⚡ SUPERHUMAN!';
    if (time < 200) return '🏆 Incredible!';
    if (time < 250) return '⭐ Excellent!';
    if (time < 300) return '👍 Good!';
    if (time < 400) return '😊 Average';
    return '💪 Keep practicing!';
}

function startTest() {
    document.getElementById('startBtn').disabled = true;
    document.getElementById('gameArea').style.background = '#0f0f1a';
    document.getElementById('result').style.display = 'none';
    
    const randomDelay = Math.random() * 3000 + 2000;
    
    waitingForStart = true;
    document.getElementById('instruction').textContent = 'Wait for green...';
    
    timeoutId = setTimeout(() => {
        waitingForStart = false;
        waitingForClick = true;
        startTime = Date.now();
        document.getElementById('gameArea').style.background = 'linear-gradient(135deg, #05ffa1, #00f3ff)';
        document.getElementById('instruction').innerHTML = '<span style="font-size: 3rem; font-weight: bold;">CLICK NOW!</span>';
    }, randomDelay);
}

function saveScore(reactionTime, currentStreak) {
    const baseScore = Math.max(100, 1000 - reactionTime);
    const streakBonus = currentStreak * 50;
    const score = baseScore + streakBonus;
    
    fetch('/api/score', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            game_key: '{{ game.game_key }}',
            score: score,
            play_time: 5
        })
    });
}

document.getElementById('startBtn').addEventListener('click', startTest);
</script>
{% endblock %}
