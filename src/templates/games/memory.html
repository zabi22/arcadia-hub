{% extends "base.html" %}

{% block title %}{{ game.name }} - Arcadia Hub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h3 class="text-white mb-2">{{ game.icon }} {{ game.name }}</h3>
                <p class="text-white-50">Find all matching pairs!</p>
            </div>
            
            <!-- Stats -->
            <div class="row mb-3">
                <div class="col-4 text-center">
                    <div class="card bg-dark">
                        <div class="card-body py-2">
                            <h6 class="text-info">Moves: <span id="moves">0</span></h6>
                        </div>
                    </div>
                </div>
                <div class="col-4 text-center">
                    <div class="card bg-dark">
                        <div class="card-body py-2">
                            <h6 class="text-warning">Time: <span id="timer">0</span>s</h6>
                        </div>
                    </div>
                </div>
                <div class="col-4 text-center">
                    <div class="card bg-dark">
                        <div class="card-body py-2">
                            <h6 class="text-success">Combo: <span id="combo">0</span>x</h6>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Difficulty Selection -->
            <div class="mb-3">
                <div class="btn-group w-100" role="group">
                    <button type="button" class="btn btn-outline-accent diff-btn active" data-diff="easy">
                        😊 Easy (4x4)
                    </button>
                    <button type="button" class="btn btn-outline-accent diff-btn" data-diff="medium">
                        🤔 Medium (5x4)
                    </button>
                    <button type="button" class="btn btn-outline-accent diff-btn" data-diff="hard">
                        😈 Hard (6x4)
                    </button>
                </div>
            </div>
            
            <!-- Game Board -->
            <div class="row g-2 mb-3" id="gameBoard">
                <!-- Cards will be generated by JavaScript -->
            </div>
            
            <!-- Controls -->
            <div class="text-center">
                <button id="restartBtn" class="btn btn-accent">
                    <i class="bi bi-arrow-clockwise"></i> New Game
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.btn-outline-accent {
    color: #00f3ff;
    border-color: #00f3ff;
}

.btn-outline-accent:hover, .btn-outline-accent.active {
    background: #00f3ff;
    color: #0a0a0f;
}

.memory-card {
    aspect-ratio: 1;
    perspective: 1000px;
    cursor: pointer;
}

.memory-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.memory-card.flipped .memory-card-inner {
    transform: rotateY(180deg);
}

.memory-card-front,
.memory-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
}

.memory-card-front {
    background: linear-gradient(135deg, #00f3ff, #b829dd);
    color: white;
    font-weight: bold;
    font-size: 2rem;
}

.memory-card-back {
    background: rgba(15, 15, 26, 0.95);
    border: 2px solid #1a1a2e;
    transform: rotateY(180deg);
}

.memory-card.matched .memory-card-back {
    background: rgba(5, 255, 161, 0.2);
    border-color: #05ffa1;
    box-shadow: 0 0 20px rgba(5, 255, 161, 0.4);
}

@keyframes matchPulse {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.1); }
    100% { transform: rotateY(180deg) scale(1); }
}

.memory-card.matched .memory-card-inner {
    animation: matchPulse 0.6s ease;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
const emojiSets = {
    easy: ['🎮', '🎮', '🐍', '🐍', '🏆', '🏆', '💰', '💰', '🎯', '🎯', '⭐', '⭐', '🚀', '🚀', '🔥', '🔥'],
    medium: ['🎮', '🎮', '🐍', '🐍', '🏆', '🏆', '💰', '💰', '🎯', '🎯', '⭐', '⭐', '🚀', '🚀', '🔥', '🔥', '💎', '💎', '🎪', '🎪'],
    hard: ['🎮', '🎮', '🐍', '🐍', '🏆', '🏆', '💰', '💰', '🎯', '🎯', '⭐', '⭐', '🚀', '🚀', '🔥', '🔥', '💎', '💎', '🎪', '🎪', '🌟', '🌟', '🎨', '🎨']
};

const gridSizes = {
    easy: { cols: 4, rows: 4 },
    medium: { cols: 5, rows: 4 },
    hard: { cols: 6, rows: 4 }
};

let cards = [];
let flippedCards = [];
let matchedPairs = 0;
let moves = 0;
let combo = 0;
let maxCombo = 0;
let startTime;
let timerInterval;
let gameStarted = false;
let difficulty = 'easy';

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Difficulty selection
document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        difficulty = this.dataset.diff;
        restartGame();
    });
});

function createBoard() {
    const board = document.getElementById('gameBoard');
    board.innerHTML = '';
    board.style.gridTemplateColumns = `repeat(${gridSizes[difficulty].cols}, 1fr)`;
    
    const emojis = emojiSets[difficulty];
    const shuffledEmojis = shuffle([...emojis]);
    
    shuffledEmojis.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'memory-card';
        card.dataset.index = index;
        card.dataset.emoji = emoji;
        
        card.innerHTML = `
            <div class="memory-card-inner">
                <div class="memory-card-front">?</div>
                <div class="memory-card-back">${emoji}</div>
            </div>
        `;
        
        card.addEventListener('click', flipCard);
        board.appendChild(card);
    });
}

function flipCard() {
    if (!gameStarted) {
        startTimer();
        gameStarted = true;
    }
    
    if (flippedCards.length === 2 || this.classList.contains('flipped') || this.classList.contains('matched')) {
        return;
    }
    
    this.classList.add('flipped');
    flippedCards.push(this);
    
    if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        checkMatch();
    }
}

function checkMatch() {
    const [card1, card2] = flippedCards;
    const match = card1.dataset.emoji === card2.dataset.emoji;
    
    if (match) {
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        document.getElementById('combo').textContent = combo;
        
        card1.classList.add('matched');
        card2.classList.add('matched');
        matchedPairs++;
        flippedCards = [];
        
        const totalPairs = emojiSets[difficulty].length / 2;
        if (matchedPairs === totalPairs) {
            endGame();
        }
    } else {
        combo = 0;
        document.getElementById('combo').textContent = combo;
        
        setTimeout(() => {
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
            flippedCards = [];
        }, 1000);
    }
}

function startTimer() {
    startTime = Date.now();
    timerInterval = setInterval(() => {
        const seconds = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer').textContent = seconds;
    }, 1000);
}

function endGame() {
    clearInterval(timerInterval);
    const time = Math.floor((Date.now() - startTime) / 1000);
    const totalPairs = emojiSets[difficulty].length / 2;
    
    // Score calculation with combo bonus
    const baseScore = Math.max(100, (totalPairs * 50) - (moves * 2) - time);
    const comboBonus = maxCombo * 20;
    const diffMultiplier = difficulty === 'easy' ? 1 : difficulty === 'medium' ? 1.5 : 2;
    const score = Math.floor((baseScore + comboBonus) * diffMultiplier);
    
    setTimeout(() => {
        const modal = document.createElement('div');
        modal.className = 'modal fade';
        modal.innerHTML = `
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" style="background: #0f0f1a; border: 1px solid #1a1a2e;">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title text-white">🎉 Level Complete!</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body text-white">
                        <div class="text-center mb-3">
                            <h2 style="color: #00f3ff;">Score: ${score}</h2>
                        </div>
                        <div class="row text-center mb-3">
                            <div class="col-4">
                                <small class="text-white-50">Moves</small>
                                <h5>${moves}</h5>
                            </div>
                            <div class="col-4">
                                <small class="text-white-50">Time</small>
                                <h5>${time}s</h5>
                            </div>
                            <div class="col-4">
                                <small class="text-white-50">Max Combo</small>
                                <h5 style="color: #05ffa1;">${maxCombo}x</h5>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-accent" onclick="location.reload()">Play Again</button>
                    </div>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const bsModal = new bootstrap.Modal(modal);
        bsModal.show();
        
        saveScore(score);
    }, 500);
}

function saveScore(score) {
    fetch('/api/score', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            game_key: '{{ game.game_key }}',
            score: score,
            play_time: Math.floor((Date.now() - startTime) / 1000)
        })
    });
}

function restartGame() {
    clearInterval(timerInterval);
    matchedPairs = 0;
    moves = 0;
    combo = 0;
    maxCombo = 0;
    flippedCards = [];
    gameStarted = false;
    document.getElementById('moves').textContent = '0';
    document.getElementById('timer').textContent = '0';
    document.getElementById('combo').textContent = '0';
    createBoard();
}

document.getElementById('restartBtn').addEventListener('click', restartGame);
createBoard();
</script>
{% endblock %}
