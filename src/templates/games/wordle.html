{% extends "base.html" %}

{% block title %}{{ game.name }} - Arcadia Hub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h3 class="text-white mb-2">{{ game.icon }} {{ game.name }}</h3>
                <p class="text-white-50">Guess the word!</p>
                
                <!-- Word Length Selection -->
                <div class="mb-3">
                    <label class="text-white mb-2">Choose word length:</label>
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-accent length-btn" data-length="3">3 Letters</button>
                        <button type="button" class="btn btn-outline-accent length-btn" data-length="4">4 Letters</button>
                        <button type="button" class="btn btn-outline-accent length-btn active" data-length="5">5 Letters</button>
                        <button type="button" class="btn btn-outline-accent length-btn" data-length="6">6 Letters</button>
                        <button type="button" class="btn btn-outline-accent length-btn" data-length="7">7 Letters</button>
                        <button type="button" class="btn btn-outline-accent length-btn" data-length="8">8 Letters</button>
                    </div>
                </div>
            </div>
            
            <!-- Game Board -->
            <div id="board" class="mb-3" style="display: grid; gap: 5px; max-width: 400px; margin: 0 auto;"></div>
            
            <!-- Keyboard -->
            <div id="keyboard" class="mb-3" style="max-width: 400px; margin: 0 auto;"></div>
            
            <!-- Controls -->
            <div class="text-center">
                <div id="message" class="text-white mb-3 fs-5"></div>
                <button id="newGameBtn" class="btn btn-accent">
                    <i class="bi bi-arrow-clockwise"></i> New Word
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.tile {
    width: 60px;
    height: 60px;
    border: 2px solid #2d3561;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: bold;
    text-transform: uppercase;
    background: rgba(22, 33, 62, 0.8);
    color: white;
    transition: all 0.3s;
}

.tile.active {
    border-color: #00d4ff;
}

.tile.correct {
    background: #00ff88 !important;
    border-color: #00ff88;
}

.tile.present {
    background: #ffd700 !important;
    border-color: #ffd700;
    color: #000;
}

.tile.absent {
    background: #2d3561 !important;
    border-color: #2d3561;
}

.key {
    padding: 15px 10px;
    margin: 3px;
    background: rgba(45, 53, 97, 0.8);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
}

.key:hover {
    background: rgba(0, 212, 255, 0.3);
}

.key.correct { background: #00ff88; color: black; }
.key.present { background: #ffd700; color: black; }
.key.absent { background: #2d3561; opacity: 0.5; }

.btn-outline-accent {
    color: #9b59b6;
    border-color: #9b59b6;
}

.btn-outline-accent:hover, .btn-outline-accent.active {
    background: #9b59b6;
    color: #0f0f1a;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
const wordLists = {
    3: ['CAT', 'DOG', 'RUN', 'SUN', 'FUN', 'HAT', 'BAT', 'MAT', 'SAT', 'PAT', 'CAR', 'BAR', 'FAR', 'JAR', 'TAR', 'BED', 'RED', 'LED', 'GET', 'SET'],
    4: ['GAME', 'CODE', 'PLAY', 'WORK', 'FIRE', 'WATER', 'EARTH', 'WIND', 'TIME', 'LIFE', 'LOVE', 'HOPE', 'DARK', 'LIGHT', 'POWER', 'MIND', 'BODY', 'SOUL', 'STAR', 'MOON'],
    5: ['PYTHON', 'GAMER', 'CODEX', 'REACT', 'FLASK', 'SMART', 'POWER', 'LIGHT', 'MUSIC', 'WORLD', 'DREAM', 'BRAIN', 'SPACE', 'OCEAN', 'RIVER', 'STONE', 'FLAME', 'STORM', 'CLOUD', 'METAL'],
    6: ['PUZZLE', 'GALAXY', 'PLANET', 'ROCKET', 'DRAGON', 'CASTLE', 'FOREST', 'GARDEN', 'ISLAND', 'JUNGLE', 'MARBLE', 'ORANGE', 'PURPLE', 'SILVER', 'GOLDEN', 'BRIDGE', 'CASTLE', 'FROZEN'],
    7: ['RAINBOW', 'DIAMOND', 'EMERALD', 'CRYSTAL', 'THUNDER', 'LIGHTNING', 'VOLCANO', 'HURRICANE', 'TYPHOON', 'ECLIPSE', 'PENGUIN', 'DOLPHIN', 'PANTHER', 'JAGUAR', 'FALCON'],
    8: ['ADVENTURE', 'CHAMPION', 'DISCOVER', 'EXCELLEN', 'FANTASTY', 'GLADIATOR', 'HARMONIA', 'IMAGINER', 'JOURNEYS', 'KINETICS', 'LABYRINTH', 'MYSTERIO', 'NIGHTFALL']
};

let secretWord = '';
let currentRow = 0;
let currentTile = 0;
let wordLength = 5;
let maxRows = 6;
let guesses = [];
let gameOver = false;

function initGame() {
    const wordList = wordLists[wordLength];
    secretWord = wordList[Math.floor(Math.random() * wordList.length)];
    console.log('Secret:', secretWord, 'Length:', wordLength);
    
    // Reset guesses array for current word length
    guesses = [];
    for (let i = 0; i < maxRows; i++) {
        guesses.push(new Array(wordLength).fill(''));
    }
    
    createBoard();
    createKeyboard();
}

function createBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    
    // Adjust tile size based on word length
    const tileSize = wordLength > 6 ? 50 : 60;
    
    for (let i = 0; i < maxRows; i++) {
        const row = document.createElement('div');
        row.style.display = 'flex';
        row.style.justifyContent = 'center';
        row.style.gap = '5px';
        
        for (let j = 0; j < wordLength; j++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}-${j}`;
            tile.style.width = tileSize + 'px';
            tile.style.height = tileSize + 'px';
            tile.style.fontSize = (wordLength > 6 ? '1.5rem' : '2rem');
            row.appendChild(tile);
        }
        board.appendChild(row);
    }
}

function createKeyboard() {
    const keyboard = document.getElementById('keyboard');
    keyboard.innerHTML = '';
    const rows = [
        'QWERTYUIOP',
        'ASDFGHJKL',
        'ZXCVBNM'
    ];
    
    rows.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.style.textAlign = 'center';
        rowDiv.style.marginBottom = '5px';
        
        for (let char of row) {
            const key = document.createElement('button');
            key.className = 'key';
            key.textContent = char;
            key.dataset.key = char;
            key.onclick = () => handleKeyPress(char);
            rowDiv.appendChild(key);
        }
        keyboard.appendChild(rowDiv);
    });
    
    // Add Enter and Backspace
    const lastRow = keyboard.lastChild;
    const enterKey = document.createElement('button');
    enterKey.className = 'key';
    enterKey.textContent = 'ENTER';
    enterKey.style.width = '60px';
    enterKey.onclick = submitGuess;
    lastRow.insertBefore(enterKey, lastRow.firstChild);
    
    const backKey = document.createElement('button');
    backKey.className = 'key';
    backKey.textContent = '⌫';
    backKey.style.width = '60px';
    backKey.onclick = deleteLetter;
    lastRow.appendChild(backKey);
}

function handleKeyPress(letter) {
    if (gameOver || currentTile >= wordLength) return;
    
    guesses[currentRow][currentTile] = letter;
    const tile = document.getElementById(`tile-${currentRow}-${currentTile}`);
    tile.textContent = letter;
    tile.classList.add('active');
    currentTile++;
}

function deleteLetter() {
    if (currentTile === 0) return;
    currentTile--;
    guesses[currentRow][currentTile] = '';
    const tile = document.getElementById(`tile-${currentRow}-${currentTile}`);
    tile.textContent = '';
    tile.classList.remove('active');
}

function submitGuess() {
    if (currentTile < wordLength) {
        showMessage('Not enough letters!');
        return;
    }
    
    const guess = guesses[currentRow].join('');
    checkGuess(guess);
}

function checkGuess(guess) {
    const solution = secretWord.split('');
    const guessArr = guess.split('');
    const result = new Array(wordLength).fill('absent');
    
    // First pass: find correct letters
    for (let i = 0; i < wordLength; i++) {
        if (guessArr[i] === solution[i]) {
            result[i] = 'correct';
            solution[i] = null;
            guessArr[i] = null;
        }
    }
    
    // Second pass: find present letters
    for (let i = 0; i < wordLength; i++) {
        if (guessArr[i] && solution.includes(guessArr[i])) {
            result[i] = 'present';
            solution[solution.indexOf(guessArr[i])] = null;
        }
    }
    
    // Animate and color tiles
    for (let i = 0; i < wordLength; i++) {
        setTimeout(() => {
            const tile = document.getElementById(`tile-${currentRow}-${i}`);
            tile.classList.remove('active');
            tile.classList.add(result[i]);
            
            // Update keyboard
            const key = document.querySelector(`[data-key="${guesses[currentRow][i]}"]`);
            if (key) {
                if (result[i] === 'correct') key.classList.add('correct');
                else if (result[i] === 'present' && !key.classList.contains('correct')) key.classList.add('present');
                else if (result[i] === 'absent' && !key.classList.contains('correct') && !key.classList.contains('present')) key.classList.add('absent');
            }
        }, i * 200);
    }
    
    // Check win/loss
    setTimeout(() => {
        if (guess === secretWord) {
            showMessage('🎉 Correct! You won!', 'success');
            gameOver = true;
            saveScore(100 * wordLength);
        } else if (currentRow === maxRows - 1) {
            showMessage(`Game Over! The word was ${secretWord}`, 'danger');
            gameOver = true;
            saveScore(10 * wordLength);
        } else {
            currentRow++;
            currentTile = 0;
        }
    }, 1000);
}

function showMessage(msg, type = 'info') {
    const msgEl = document.getElementById('message');
    msgEl.textContent = msg;
    msgEl.className = `text-${type === 'success' ? 'success' : type === 'danger' ? 'danger' : 'white'} mb-3 fs-5`;
}

function saveScore(score) {
    fetch('/api/score', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            game_key: '{{ game.game_key }}',
            score: score,
            play_time: 60
        })
    });
}

document.getElementById('newGameBtn').addEventListener('click', () => {
    currentRow = 0;
    currentTile = 0;
    gameOver = false;
    guesses = [];
    for (let i = 0; i < maxRows; i++) {
        guesses.push(new Array(wordLength).fill(''));
    }
    document.getElementById('message').textContent = '';
    initGame();
});

// Word length selection
document.querySelectorAll('.length-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.length-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        wordLength = parseInt(this.dataset.length);
        
        // Reset game with new word length
        currentRow = 0;
        currentTile = 0;
        gameOver = false;
        guesses = [];
        for (let i = 0; i < maxRows; i++) {
            guesses.push(new Array(wordLength).fill(''));
        }
        document.getElementById('message').textContent = '';
        initGame();
    });
});

// Keyboard input
document.addEventListener('keydown', (e) => {
    if (gameOver) return;
    
    if (e.key === 'Enter') {
        submitGuess();
    } else if (e.key === 'Backspace') {
        deleteLetter();
    } else if (/^[a-zA-Z]$/.test(e.key)) {
        handleKeyPress(e.key.toUpperCase());
    }
});

initGame();
</script>
{% endblock %}
