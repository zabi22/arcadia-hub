{% extends "base.html" %}

{% block title %}Login - Arcadia Hub{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-controller" style="font-size: 3rem; color: var(--accent-color);"></i>
                <h2 class="mt-3 text-white">Welcome Back!</h2>
                <p class="text-white-50">Login to continue your gaming journey</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label text-white">Username or Email</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" 
                           id="username" name="username" required autofocus>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label text-white">Password</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" 
                           id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 py-2">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>
            
            {% if request.environ.get('GOOGLE_CLIENT_ID') or True %}
            <div class="text-center mt-3">
                <div class="position-relative my-3">
                    <hr class="border-secondary">
                    <span class="position-absolute top-50 start-50 translate-middle bg-dark px-3 text-white-50">or</span>
                </div>
                <a href="{{ url_for('auth.google_login') }}" class="btn btn-outline-light w-100 py-2">
                    <i class="bi bi-google"></i> Continue with Google
                </a>
            </div>
            {% endif %}
            
            <div class="text-center mt-4">
                <p class="text-white-50 mb-0">Don't have an account?</p>
                <a href="{{ url_for('auth.register') }}" class="text-white fw-bold">Register here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
